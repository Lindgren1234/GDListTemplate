name: Auto Add Approved Run
on:
  repository_dispatch:
    types: [approve_run]

jobs:
  add_record:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update JSON File
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const payload = context.payload.client_payload;
            // Gör om banans namn till gemener och ersätter mellanslag med understreck (t.ex. "Blood Bath" blir "blood_bath")
            const levelName = payload.level.toLowerCase().trim().replace(/ /g, "_");
            
            // PATH_TO_LEVELS: Ändra 'data' om dina JSON-filer ligger i en annan mapp (t.ex. 'levels')
            const filePath = path.join('data', `${levelName}.json`); 
            
            if (!fs.existsSync(filePath)) {
              core.setFailed(`Hittade inte filen för banan: ${filePath}. Kontrollera att banans namn stavades exakt rätt i kalkylarket.`);
              return;
            }
            
            let levelData = JSON.parse(fs.readFileSync(filePath, 'utf8'));
            
            if (!levelData.records) {
              levelData.records = [];
            }
            
            // Lägger till spelaren i listans records
            levelData.records.push({
              user: payload.player,
              percent: payload.percent,
              link: payload.video
            });
            
            fs.writeFileSync(filePath, JSON.stringify(levelData, null, 2), 'utf8');

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Auto-added record for ${{ github.event.client_payload.player }} on ${{ github.event.client_payload.level }}"
          git push
